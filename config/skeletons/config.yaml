# config.yaml - one eGPT node.
#
# Don't configure by hand. Please run configuration script: <>
#
#
# Please copy this file, and paste into you favorite agentic coder, or configure
# manually, old-school way.
#
#
# Copy this file to ~/.egpt/config/config.yaml, fill the
# blanks, and the node runs. Uncommented = working default; commented = optional
# override (default shown). Full key reference: config/config-schema.mjs.
# Comments are ASCII-only on purpose: this file is copied/seeded across machines,
# and non-ASCII punctuation corrupts through some encodings.

# --- Beeper accounts ---------------------------------------------------------
# eGPT reaches the world through Beeper Desktop's local API (127.0.0.1:23373).
# Store one or MANY accounts (each account + its token together); `use` selects
# the one this node connects with - switch by changing `use`, no re-typing tokens.
# Keep this file private. Token: Beeper Desktop > Settings > Developer > Desktop API.
beeper:
  use: main                       # which account below this node connects with
  main:
    account: "you@example.com"    # the account this token belongs to (label)
    token: "PASTE_YOUR_TOKEN_HERE"
  # alt:
  #   account: "other@example.com"
  #   token: "PASTE_YOUR_TOKEN_HERE"

# --- This node's identity ----------------------------------------------------
node_name: kg                     # this node's name on the network
# node_alias: [kg2, kg3]            # extra identities this ONE process also answers to
user_name: "John"                  # the human here; shown as <user_name>@<surface>

# account_peers - node identities sharing THIS Beeper account (include self).
# Nodes on DIFFERENT accounts appear as distinct room members and need no listing;
# co-account nodes collapse to one member, so list them here to complete the HRW
# candidate set. Omit for a solo node.
# account_peers: [kg, do]

# --- Agents (what this node answers to) --------------------------------------
# REQUIRED. A node answers ONLY the agents it lists - nothing is injected. Two
# nodes hosting the same name BOTH reply (same being); use different names for a
# single answerer. The bridge stamps body_emoji so humans see which node spoke.
agents:
  egpt:
    configuration: egpt           # brain: config/agents/egpt.yaml (warm claude CLI)
    handles: [e, egpt]            # @e / @egpt reach this node's persona
    default: true                 # THE persona: answers un-mentioned messages + ends relay chains. EXACTLY ONE agent per node. Its map KEY is the being-id (renaming the key = a new identity).
    # name: "egpt"                # display label the bridge stamps ("<emoji> <name>: <reply>"); defaults to the key.
    # body_emoji: "<emoji>"       # reply stamp the bridge enforces; default is the dog.
    #                             # A 2nd node sets its OWN so humans see which node spoke.

# Relay agents (optional - foreign-mesh across SEPARATE accounts). A relay
# forwards a mention into another chat; `to:` chains hops. Not needed within one account.
# carol: { relay_channel: rodz1, to: don.do }

# --- Surfaces (who may command this node) ------------------------------------
# Per-surface, because ids are per-network namespaces. allowed_users = STABLE ids
# (jids / room ids, never display names); [] = deny (the account owner is always
# allowed). chat_id = your Self-DM command channel, auto-captured on first contact.
networks:
  whatsapp:
    chat_ids: [] # chats that accept commands (/egpt, /restart, /upgrade, etc)
    allowed_users: [] # id of user allowed to issue commands in the chat_ids
  telegram: { chat_ids: [], allowed_users: [] }
  signal:   { chat_ids: [], allowed_users: [] }

# --- Dispatch: global E-routing knobs ----------------------------------------
# E is a sibling, not a network, so these live OUTSIDE the transport blocks.
# Per-chat modes live in each conversation (set via /e auto <mode> <chat>); these
# are the node-wide defaults. All commented = defaults shown.
# dispatch:
#   auto_default_mode: mention      # reply mode for a chat with no explicit mode (on|mute|mention-direct|mention|off)
#   auto_paused: false              # absolute @e-emit kill-switch (/e auto pause|resume)
#   send_to_egpt: mode              # global default: keep the persona in context even when it will not reply (always|mode)

# --- Transcription: a standalone LAN service ---------------------------------
# By default eGPT launches a whisper-server to transcribe audio notes
# (ask your AI to download models from: https://huggingface.co/ggerganov/whisper.cpp)
#
# transcription_service:
#   enabled: true
#   use_config: main
#   main:
#     fallback_order: [gpu, local]
#     gpu:   { type: whisper-server-remote, endpoint: "http://192.168.1.102:23390", token: "SHARED_SECRET" }
#     local: { type: whisper-cli, command: C:\path\whisper-cli.exe, model_path: C:\path\ggml-large-v3.bin, language: es, ffmpeg_command: C:\path\ffmpeg.exe }
#
# To HOST the server for other nodes (the GPU box - the "transcriptor" worker role):
# transcriptor:
#   enabled: true                 # answer POST /v1/transcribe for a main spine (this node's WORKER role)
#   bind: "0.0.0.0"               # LAN ip / 0.0.0.0 to accept a remote spine; NEVER the internet
#   port: 23390                   # what a client's transcription_service endpoint points at
#   server:                       # resident whisper.cpp server: load the model ONCE (~12s per note -> ~2s)
#     enabled: true
#     command: C:\path\whisper-server.exe
#     model: C:\path\ggml-large-v3.bin   # falls back to transcription.cli.model_path below
#     host: 127.0.0.1
#     port: 8089
#     language: es
# transcription:
#   server: { token: "SHARED_SECRET" }   # HMAC auth; SAME value on the worker and its clients
#   cli:                          # whisper-cli binary/model: the worker's engine + the universal fallback
#     command: C:\path\whisper-cli.exe
#     model_path: C:\path\ggml-large-v3.bin
#     language: es
#     ffmpeg_command: C:\path\ffmpeg.exe

# --- Transcript echo: who posts the ear ("listened") transcript --------------
# The echo posts a voice note's transcript back into the chat. Among the echo-capable
# eGPT nodes present in a room, HRW picks exactly ONE to post each note (rotates per
# note - no fixed echoer, no duplicate). If the picked node stays silent past
# echo_timeout_ms, the next-ranked node takes over (covers an offline node).
# echo: true                      # this node may echo (default true)
# echo_timeout_ms: 5000           # rank N+1 promotes after this much silence
# echo_max_age_ms: 3600000        # never echo a note older than this (skips resynced backlog)

# --- Everyday knobs (defaults shown) -----------------------------------------
# default_time_zone: "America/New_York"                       # timezone-less heartbeat times
# warm: { max: 6, idle_ttl_by_class: { conversation: 15m } }  # keep chats warm; 0 = never evict
# compaction: { enabled: true, ratio: 0.20, cooling_ms: 120000 }
# guard: { turns: 6, window: -1 }   # loop-breaker: N consecutive non-human turns pause a channel (a human msg resets); -1 turns = off, -1 window = pure consecutive count
# advice_channel: "EGPT AUTO"     # mode:auto consult chat (fail-closed if unset)
# aliases: { "@whatsapp_5215512345678:beeper.local": An }     # /status display labels
